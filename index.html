<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属视频播放</title>
    <style>
        /* 基础页面样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            transition: background-color 0.5s ease;
        }

        /* 密码输入框的容器 */
        .login-container {
            text-align: center;
            background: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            margin-top: 0;
            color: #333;
        }

        input[type="password"] {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 20px;
            width: 220px;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: #007bff;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 15px;
            font-size: 14px;
            display: none; /* 初始隐藏错误提示 */
        }

        /* 视频播放器的容器 */
        #video-container {
            display: none; /* 初始隐藏视频 */
            width: 90%;
            max-width: 800px;
        }

        video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }
    </style>
</head>
<body>

    <div class="login-container" id="login-container">
        <h2>请输入访问密码</h2>
        <input type="password" id="password" placeholder="输入密码" />
        <br>
        <button onclick="checkPassword()">验证并播放</button>
        <div class="error-msg" id="error-msg">密码错误，请重新输入！</div>
    </div>

    <div id="video-container">
        <video id="my-video" controls controlsList="nodownload">
            <source src="https://v4.gh-proxy.org/https://github.com/jfjdjdhsj/tubiao/releases/download/mp4/yy0l1b.mp4" type="video/mp4">
            您的浏览器不支持 HTML5 视频播放，请更换现代浏览器（如 Chrome 或 Edge）。
        </video>
    </div>

    <script>
        function checkPassword() {
            // 获取用户输入的密码
            const pwd = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const loginContainer = document.getElementById('login-container');
            const videoContainer = document.getElementById('video-container');
            const videoElement = document.getElementById('my-video');

            // 验证密码是否为 1924
            if (pwd === '1924') {
                // 隐藏登录框，显示视频框
                loginContainer.style.display = 'none';
                videoContainer.style.display = 'block';
                
                // 把背景变成深色，观看体验更好
                document.body.style.backgroundColor = '#1a1a1a';
                
                // 自动开始播放视频
                videoElement.play();
            } else {
                // 密码错误，显示提示信息
                errorMsg.style.display = 'block';
                // 清空输入框方便重新输入
                document.getElementById('password').value = '';
            }
        }

        // 监听键盘事件：支持按下回车键（Enter）直接提交
        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
    </script>

</body>
</html>
