<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属视频播放</title>
    <style>
        /* 基础页面样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            transition: background-color 0.5s ease;
        }

        /* 密码输入框容器 */
        .login-container {
            text-align: center;
            background: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            margin-top: 0;
            color: #333;
        }

        input[type="password"] {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 20px;
            width: 220px;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: #007bff;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        /* ----- 新增：弹窗样式 ----- */
        .alert-overlay {
            display: none; /* 初始隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* 半透明黑色背景 */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .alert-box {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: popIn 0.3s ease-out;
        }

        .alert-box h3 {
            margin-top: 0;
            color: #333;
            font-size: 20px;
        }

        .alert-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
        }

        /* 弹窗出现的简单动画 */
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 视频播放器容器 */
        #video-container {
            display: none;
            width: 90%;
            max-width: 800px;
        }

        video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }
    </style>
</head>
<body>

    <!-- 1. 密码输入区域 -->
    <div class="login-container" id="login-container">
        <h2>请输入访问密码</h2>
        <input type="password" id="password" placeholder="输入密码" />
        <br>
        <button onclick="checkPassword()">验证</button>
        <div class="error-msg" id="error-msg">密码错误，请重新输入！</div>
    </div>

    <!-- 2. 新增：音量提示弹窗 -->
    <div class="alert-overlay" id="volume-alert">
        <div class="alert-box">
            <h3>⚠️ 温馨提示</h3>
            <p>即将播放视频，请注意音量大小，建议佩戴耳机 🎧</p>
            <button onclick="startVideo()">确定，开始播放</button>
        </div>
    </div>

    <!-- 3. 视频播放区域 -->
    <div id="video-container">
        <video id="my-video" controls controlsList="nodownload">
            <source src="https://v4.gh-proxy.org/https://github.com/jfjdjdhsj/tubiao/releases/download/mp4/IMG_9246.MP4" type="video/mp4">
            您的浏览器不支持 HTML5 视频播放。
        </video>
    </div>

    <script>
        // 验证密码的函数
        function checkPassword() {
            const pwd = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const loginContainer = document.getElementById('login-container');
            const volumeAlert = document.getElementById('volume-alert');

            if (pwd === '911') {
                // 密码正确：隐藏登录框，显示提示弹窗
                loginContainer.style.display = 'none';
                volumeAlert.style.display = 'flex';
                
                // 提前把背景变暗，营造氛围
                document.body.style.backgroundColor = '#1a1a1a';
            } else {
                // 密码错误：显示提示
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        // 点击弹窗“确定”后执行的函数
        function startVideo() {
            const volumeAlert = document.getElementById('volume-alert');
            const videoContainer = document.getElementById('video-container');
            const videoElement = document.getElementById('my-video');

            // 隐藏弹窗，显示视频
            volumeAlert.style.display = 'none';
            videoContainer.style.display = 'block';
            
            // 开始播放视频
            videoElement.play();
        }

        // 支持回车键提交密码
        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
    </script>

</body>
</html>
